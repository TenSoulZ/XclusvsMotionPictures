services:
  # Backend: Django
  - type: web
    name: xmp-backend
    env: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn xmp_backend.wsgi:application --access-logfile - --error-logfile -"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: static
          name: xmp-frontend
          property: url

  # Frontend: React
  - type: static
    name: xmp-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    publishDir: "dist"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_URL
        value: "https://xmp-backend.onrender.com/api"
